<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SoloForte — Planejamento Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sf-samsung:    #1428A0;
    --sf-navy:       #2C5564;
    --sf-navy-light: #3A6B7D;
    --sf-amber:      #F5B935;
    --sf-cream:      #F7F5F0;
    --sf-stone:      #E8E4DC;
    --sf-text:       #1D1D1F;
    --sf-text-muted: #6B7280;
    --sf-white:      #FFFFFF;
    --sf-gray:       #F5F5F7;
    --sf-shadow:     rgba(44, 85, 100, 0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    overflow-x: hidden;
    background: var(--sf-white);
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    background: var(--sf-cream);
    color: var(--sf-text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    background: var(--sf-white);
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }

  .header {
    background: linear-gradient(135deg, var(--sf-samsung) 0%, var(--sf-navy) 100%);
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 80% 20%, rgba(245,185,53,0.12) 0%, transparent 50%),
      radial-gradient(circle at 10% 80%, rgba(255,255,255,0.08) 0%, transparent 40%);
    pointer-events: none;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .logo-area { display: flex; align-items: center; gap: 10px; }

  .logo-img {
    width: 38px; height: 38px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }

  .logo-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--sf-white);
    letter-spacing: 0.02em;
  }

  .efficiency-badge {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    min-width: 88px;
    color: var(--sf-white);
  }

  .efficiency-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
  }

  .efficiency-label {
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top: 4px;
  }

  .header-meta { position: relative; z-index: 1; }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--sf-white);
    margin-bottom: 6px;
  }

  .header-period {
    font-size: 14px;
    color: rgba(255,255,255,0.85);
  }

  .print-bar {
    display: flex;
    justify-content: flex-end;
    padding: 12px 24px 0;
  }

  .print-btn {
    appearance: none;
    border: 1px solid var(--sf-stone);
    background: var(--sf-white);
    color: var(--sf-navy);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  .print-btn:hover { background: var(--sf-gray); }

  .content { padding: 24px 32px 40px; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: var(--sf-gray);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }

  .summary-n {
    display: block;
    font-size: 22px;
    font-weight: 700;
    color: var(--sf-navy);
    line-height: 1.1;
  }

  .summary-l {
    display: block;
    margin-top: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--sf-text-muted);
  }

  .day-card {
    border: 1px solid var(--sf-stone);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
    background: var(--sf-white);
  }

  .day-card.sunday {
    border-color: rgba(20, 40, 160, 0.25);
    background: #F4F6FC;
  }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--sf-stone);
    background: var(--sf-gray);
  }

  .day-card.sunday .day-header {
    background: rgba(20, 40, 160, 0.08);
  }

  .day-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--sf-text);
    text-transform: capitalize;
  }

  .day-date {
    font-size: 12px;
    color: var(--sf-text-muted);
    margin-top: 2px;
  }

  .day-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--sf-navy);
    background: var(--sf-white);
    border-radius: 99px;
    padding: 4px 10px;
    border: 1px solid var(--sf-stone);
  }

  .day-body { padding: 12px 16px 16px; }

  .empty-day {
    font-size: 13px;
    color: var(--sf-text-muted);
    padding: 4px 0;
  }

  .event-row {
    border: 1px solid var(--sf-stone);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    background: var(--sf-white);
  }

  .event-row:last-child { margin-bottom: 0; }

  .event-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .event-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--sf-text);
  }

  .event-time {
    font-size: 12px;
    color: var(--sf-text-muted);
    margin-top: 2px;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  .status-agendado { background: #FEF3C7; color: #92400E; }
  .status-emAndamento, .status-finalizando { background: #DBEAFE; color: #1E40AF; }
  .status-concluido { background: #DCFCE7; color: #166534; }
  .status-cancelado { background: #F3F4F6; color: #6B7280; }

  .event-fields {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 4px 8px;
    font-size: 13px;
  }

  .fl { color: var(--sf-text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding-top: 2px; }
  .fv { color: var(--sf-text); }

  .footer {
    border-top: 1px solid var(--sf-stone);
    padding: 18px 32px 28px;
    background: var(--sf-gray);
  }

  .sf-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .sf-brand-logo {
    width: 22px;
    height: 22px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .sf-brand-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .sf-brand-copy strong {
    font-size: 14px;
    font-weight: 600;
    color: var(--sf-text);
  }

  .sf-brand-tagline {
    font-size: 11px;
    line-height: 1.4;
    color: #667085;
  }

  .logo-area:empty { display: none; }

  @media print {
    body { background: white; }
    .page { max-width: none; box-shadow: none; }
    .print-bar { display: none !important; }
    .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .day-card { break-inside: avoid; }
  }

  @media (max-width: 640px) {
    .header, .content, .footer { padding-left: 20px; padding-right: 20px; }
    .summary-grid { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .header-title { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-top">
      <div class="logo-area">
        {{report_header_signature}}
      </div>
      <div class="efficiency-badge">
        <div class="efficiency-value">{{efficiency_pct}}%</div>
        <div class="efficiency-label">Eficiência</div>
      </div>
    </div>
    <div class="header-meta">
      <div class="header-title">Planejamento Semanal</div>
      <div class="header-period">{{periodo_label}}</div>
    </div>
  </header>

  <div class="print-bar">
    <button class="print-btn" type="button" onclick="window.print()">Salvar PDF</button>
  </div>

  <main class="content">
    <div class="summary-grid">
      <div class="summary-card">
        <span class="summary-n">{{total_eventos}}</span>
        <span class="summary-l">Eventos</span>
      </div>
      <div class="summary-card">
        <span class="summary-n">{{concluidos}}</span>
        <span class="summary-l">Concluídos</span>
      </div>
      <div class="summary-card">
        <span class="summary-n">{{clientes_unicos}}</span>
        <span class="summary-l">Clientes</span>
      </div>
    </div>

    <!-- {{#each days}} -->
    <!-- {{/each}} -->
  </main>

  <footer class="footer">
    {{report_footer_signature}}
  </footer>

</div>
</body>
</html>
